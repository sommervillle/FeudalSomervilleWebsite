<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>feudal-somerville</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /*
        Pre-React splash. Rendered straight from index.html so the
        dark backdrop is painted before the JS bundle parses — no
        flash of Hero between document paint and the first React
        commit. main.tsx decides whether to run the fade sequence
        or remove the element immediately, based on route +
        sessionStorage + prefers-reduced-motion.

        Easing matches motion.ts EASE_OUT (0.16, 1, 0.3, 1).
      */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 200;
        background: #0A0A0A;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      #splash img {
        height: 160px;
        width: auto;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity   0.7s cubic-bezier(0.16, 1, 0.3, 1),
          transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        user-select: none;
        -webkit-user-drag: none;
      }
      @media (min-width: 768px) {
        #splash img { height: 200px; }
      }
      /* Loading bar pinned to the top edge. Width transitions
         linearly over 2.5s — matches the full splash duration so
         the bar reaches 100% exactly as the splash finishes
         fading out. Inside the splash container so it fades with
         the backdrop on the way out. */
      #splash-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 2px;
        width: 0;
        background: #F2F1ED;
        transition: width 2.5s linear;
      }
      #splash.splash--fade-in img {
        opacity: 1;
        transform: translateY(0);
      }
      #splash.splash--fade-in #splash-bar { width: 100%; }
      #splash.splash--fade-out { opacity: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="splash" aria-hidden="true">
      <div id="splash-bar"></div>
      <img src="/monogram.png" alt="" />
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
