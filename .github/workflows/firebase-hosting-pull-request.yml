# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
env:
  # Opt the runner into Node.js 24 ahead of GitHub's forced
  # upgrade. Per the deprecation note in the action logs, Node 20
  # is being deprecated 2025-09-19; setting this preempts any
  # half-rolled-out enforcement and silences the per-run warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FEUDAL_SOMERVILLE }}
          projectId: feudal-somerville
