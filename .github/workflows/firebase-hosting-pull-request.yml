#
# Note: action-hosting-deploy pinned to v0.9.0 explicitly rather
# than the floating @v0 tag. The floating tag was recently bumped
# to v0.10.0 (which added a new --force argument and other
# changes), and our preview deploys started failing with
# "process npx failed with exit code 1" immediately after. Pin
# to the last known-good version while the v0.10.0 issue is
# understood.

name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
env:
  # Opt the runner into Node.js 24 ahead of GitHub's
  # forced upgrade (June 2 / Sept 16 deprecation milestones).
  # Quiets the deprecation warning on actions/checkout and the
  # firebase deploy action.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0.9.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FEUDAL_SOMERVILLE }}
          projectId: feudal-somerville
